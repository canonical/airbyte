name: Canonical CD

on:
  push:
    branches:
      - master

jobs:
  get_changed_directories_list:
    name: Get List Of Changed Directories
    runs-on: ubuntu-latest
    outputs:
      connectors_list_json: ${{ steps.detect-changes.outputs.connectors_list_json }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure full history

      - name: Detect changed connectors
        id: detect-changes
        uses: ./.github/actions/detect-changes
        with:
          base_commit: ${{ github.event.before }}
          head_commit: ${{ github.sha }}

  build_and_push:
    runs-on: ubuntu-latest
    if: needs.get_changed_directories_list.outputs.connectors_list_json != '[]'
    needs: [get_changed_directories_list]
    strategy:
      matrix:
        dir: ${{ fromJson(needs.get_changed_directories_list.outputs.connectors_list_json) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure full history

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install Poe
        run: |
          uv tool install poethepoet
          sudo snap install yq || sudo snap refresh yq

      - name: Resolve connector build variables
        id: connector-vars
        env:
          CONNECTOR: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          CONNECTOR_ROOT="airbyte-integrations/connectors/$CONNECTOR"
          if [[ ! "$CONNECTOR" =~ ^[a-z0-9-]+$ ]]; then
            echo "❌ Invalid connector name: $CONNECTOR"
            exit 1
          fi

          if [ ! -d "$CONNECTOR_ROOT" ]; then
            echo "⚠️ Warning: Connector directory $CONNECTOR_ROOT not found! Skipping..."
            echo "connector-exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "connector-exists=true" >> "$GITHUB_OUTPUT"
          cd "$CONNECTOR_ROOT"
          CONNECTOR_LANGUAGE="$(poe -qq get-language)"
          CONNECTOR_BASE_IMAGE="$(poe -qq get-base-image)"

          if [ -z "$CONNECTOR_LANGUAGE" ] || [ -z "$CONNECTOR_BASE_IMAGE" ]; then
            echo "❌ Failed to resolve connector language/base image for $CONNECTOR"
            exit 1
          fi

          echo "connector-language=$CONNECTOR_LANGUAGE" >> "$GITHUB_OUTPUT"
          echo "connector-base-image=$CONNECTOR_BASE_IMAGE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: ${{ steps.connector-vars.outputs.connector-exists == 'true' && steps.connector-vars.outputs.connector-language == 'java' }}
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        if: ${{ steps.connector-vars.outputs.connector-exists == 'true' && steps.connector-vars.outputs.connector-language == 'java' }}
        with:
          cache-read-only: false
          cache-write-only: false
          add-job-summary: "on-failure"
          gradle-version: "8.14"

      - name: Build Java connector tarball
        if: ${{ steps.connector-vars.outputs.connector-exists == 'true' && steps.connector-vars.outputs.connector-language == 'java' }}
        env:
          CONNECTOR: ${{ matrix.dir }}
        run: |
          ./gradlew ":airbyte-integrations:connectors:${CONNECTOR}:distTar"

      - name: Build and push Docker images for connector ${{ matrix.dir }}
        id: build-and-push-images
        if: ${{ steps.connector-vars.outputs.connector-exists == 'true' }}
        env:
          CI_GIT_BRANCH: ${{ github.head_ref }}
          CONNECTOR: ${{ matrix.dir }}
          CONNECTOR_LANGUAGE: ${{ steps.connector-vars.outputs.connector-language }}
          CONNECTOR_BASE_IMAGE: ${{ steps.connector-vars.outputs.connector-base-image }}
          IMAGE_HTTP_PROXY: ${{ vars.HTTP_PROXY }}
          IMAGE_HTTPS_PROXY: ${{ vars.HTTPS_PROXY }}
        run: |
          set -euo pipefail
          METADATAFILE="airbyte-integrations/connectors/$CONNECTOR/metadata.yaml"

          # Extract metadata
          VERSION="$(yq eval '.data.canonicalImageTag' "$METADATAFILE")"
          NAME="$(yq eval '.data.dockerRepository' "$METADATAFILE")"
          if [ -z "$VERSION" ] || [ -z "$NAME" ] || [ "$VERSION" = "null" ] || [ "$NAME" = "null" ]; then
            echo "❌ Missing canonicalImageTag or dockerRepository in $METADATAFILE"
            exit 1
          fi
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/$NAME:$VERSION"
          DEV_IMAGE="airbyte/$CONNECTOR:dev"
          DOCKERFILE_PATH="docker-images/Dockerfile.${CONNECTOR_LANGUAGE}-connector"

          if [ ! -f "$DOCKERFILE_PATH" ]; then
            echo "❌ Unsupported connector language '$CONNECTOR_LANGUAGE': missing $DOCKERFILE_PATH"
            exit 1
          fi

          echo "🚀 Building $CONNECTOR with direct Docker buildx flow..."
          docker buildx build \
            --load \
            -f "$DOCKERFILE_PATH" \
            -t "$DEV_IMAGE" \
            --build-arg BASE_IMAGE="$CONNECTOR_BASE_IMAGE" \
            --build-arg CONNECTOR_NAME="$CONNECTOR" \
            --build-arg HTTP_PROXY="$IMAGE_HTTP_PROXY" \
            --build-arg HTTPS_PROXY="$IMAGE_HTTPS_PROXY" \
            "airbyte-integrations/connectors/$CONNECTOR"

          # Ensure the dev-tagged image exists before pushing
          if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "$DEV_IMAGE"; then
            echo "✅ Found built image: $DEV_IMAGE"

            if grep -q "docker.io/airbyte/source-declarative-manifest" "$METADATAFILE"; then
              echo "🛠️ Detected manifest-only connector."
              CUSTOM_IMAGE="airbyte/$CONNECTOR:custom"
              .github/scripts/build_custom_docker_image.sh "$CUSTOM_IMAGE" "$DEV_IMAGE"
              PUSH_IMAGE="$CUSTOM_IMAGE"
            else
              PUSH_IMAGE="$DEV_IMAGE"
            fi

            echo "🔄 Tagging and pushing $PUSH_IMAGE to $IMAGE_NAME"
            docker tag "$PUSH_IMAGE" "$IMAGE_NAME"
            docker push "$IMAGE_NAME"
          else
            echo "❌ Error: Image $DEV_IMAGE was not found after build."
            exit 1
          fi
