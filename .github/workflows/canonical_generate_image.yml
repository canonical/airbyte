name: Canonical Generate Image

on:
  workflow_dispatch:
    inputs:
      connectors:
        description: >
          Comma-separated list of connector names to build and push
          (e.g. source-github-2,source-mysql).
        required: true
        type: string
      image_version:
        description: >
          Optional GHCR tag override. If empty, uses canonicalImageTag from
          each connector's metadata.yaml.
        required: false
        type: string
        default: ""
      dry_run:
        description: >
          Dry run: build the image but skip pushing to GHCR.
          Useful for verifying a build without publishing.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  resolve_connectors:
    name: Resolve Connector List
    runs-on: ubuntu-latest
    outputs:
      connectors_list_json: ${{ steps.list.outputs.connectors_list_json }}
    steps:
      - name: Build connector list from dispatch input
        id: list
        env:
          CONNECTORS_INPUT: ${{ inputs.connectors }}
        run: |
          JSON=$(echo "$CONNECTORS_INPUT" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | jq -R . \
            | jq -s -c .)
          echo "connectors_list_json=$JSON" >> "$GITHUB_OUTPUT"

  generate_and_push_image:
    runs-on: ubuntu-latest
    if: needs.resolve_connectors.outputs.connectors_list_json != '[]'
    needs: [resolve_connectors]
    strategy:
      matrix:
        dir: ${{ fromJson(needs.resolve_connectors.outputs.connectors_list_json) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure full history

      - name: Build and push image for ${{ matrix.dir }}
        uses: ./.github/actions/canonical-image-build-push
        with:
          connector: ${{ matrix.dir }}
          image-version-override: ${{ inputs.image_version }}
          dry-run: ${{ inputs.dry_run }}
          http-proxy: ${{ vars.HTTP_PROXY }}
          https-proxy: ${{ vars.HTTPS_PROXY }}
