spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - ziftone_username
      - ziftone_password
    properties:
      ziftone_username:
        type: string
        description: An email address
        order: 0
        title: ZiftONE Username
      ziftone_password:
        type: string
        order: 1
        title: ZiftONE Password
        airbyte_secret: true
      start_time:
        type: string
        title: Start time
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
        format: date-time
        order: 2
    additionalProperties: true

