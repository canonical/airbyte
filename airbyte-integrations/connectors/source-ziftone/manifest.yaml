    name: ZiftONE Deals
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        pagination_strategy:
          type: PageIncrement
          start_from_page: 2
          page_size: 20
        page_size_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: size
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: page
      requester:
        type: HttpRequester
        url: https://supplier.ziftone.com/api/dealregistration/deals/
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: https://supplier.ziftone.com/api/authorization/login
            http_method: POST
            request_body:
              type: RequestBodyJsonObject
              value:
                password: "{{ config['ziftone_password'] }}"
                userType: SUPPLIER
                username: "{{ config['ziftone_username'] }}"
          session_token_path:
            - token
          request_authentication:
            type: ApiKey
            inject_into:
              type: RequestOption
              field_name: Authorization
              inject_into: header
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - content
