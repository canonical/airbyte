spec:
  type: Spec
  connection_specification:
    type: object
    title: Udemy Business Source Spec
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - account_name
      - account_id
      - client_id
      - client_secret
    properties:
      to_date:
        type: string
        description: >-
          Optional. Filter user-activity and user-course-activity records up to
          this date (format: YYYY-MM-DD).
      client_id:
        type: string
      from_date:
        type: string
        description: >-
          Optional. Filter user-activity and user-course-activity records from
          this date (format: YYYY-MM-DD).
      page_size:
        type: integer
        description: >-
          Optional. Number of records per page for paginated API requests.
          Defaults to 20.
        default: 20
        maximum: 100
        minimum: 1
      account_id:
        type: string
      account_name:
        type: string
      client_secret:
        type: string
        airbyte_secret: true

