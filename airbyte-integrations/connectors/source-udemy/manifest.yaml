version: 6.60.16

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - courses

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: BasicHttpAuthenticator
        password: "{{ config['client_secret'] }}"
        username: "{{ config['client_id'] }}"
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            max_retries: 5
            response_filters:
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 429
            backoff_strategies:
              - type: WaitTimeFromHeader
                header: Retry-After
                regex: ([0-9]+)
          - type: DefaultErrorHandler
            max_retries: 5
            response_filters:
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 500
                  - 502
                  - 503
                  - 504
            backoff_strategies:
              - type: ConstantBackoffStrategy
                backoff_time_in_seconds: 60
          - type: DefaultErrorHandler
            response_filters:
              - type: HttpResponseFilter
                action: FAIL
                http_codes:
                  - 403
                error_message: >-
                  Your Udemy API credentials have expired or lack the required
                  scopes.
      request_parameters:
        page_size: "{{ config.get('page_size', 20) }}"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestPath
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ response.get('next', '') }}"
          stop_condition: "{{ response.get('next') is none }}"

