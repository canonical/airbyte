# [Connector Acceptance Tests](https://docs.airbyte.com/connector-development/testing-connectors/connector-acceptance-tests-reference)
#
# Version to run local machine-specific environment (e.g. in development),
# since secrets are not available in CI
# CI version is configured in acceptance-test-config.yml
#
# Note: `Courses` stream is excluded from local acceptance tests since it returns 28k+ records,
# and has no filtering parameters to limit that (limiting pages number is not provided either in Airbyte Connector Acceptance Test)
# This causes local tests to run for too long and timeout.

connector_image: airbyte/source-udemy:dev
test_strictness_level: high
acceptance_tests:
  spec:
    tests:
      - spec_path: "manifest.yaml"
  connection:
    tests:
      - config_path: "secrets/config.json"
        status: "succeed"
  discovery:
    tests:
      - config_path: "secrets/config.json"
  basic_read:
    tests:
      - config_path: "secrets/config.json"
        # empty_streams excludes these from the read test (configured_catalog_path is ignored by the CDK test runner;
        # stream exclusion must be done via empty_streams instead)
        empty_streams:
          - name: courses
            bypass_reason: "Returns 28k+ records with no date filtering - excluded from local tests to prevent excessive runtime"
        timeout_seconds: 1200
        fail_on_extra_columns: false
  incremental:
    bypass_reason: "All streams are full refresh only; no incremental cursors are configured."
  full_refresh:
    bypass_reason: "Covered by basic_read above; full_refresh is not a recognized test category in the CDK 7.x test runner."

  