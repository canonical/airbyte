version: 7.10.0

type: DeclarativeSource

description: >-
  Skills Base source connector. This connector reads person-linked skill ratings
  and qualification assignments from the Skills Base REST API.

check:
  type: CheckStream
  stream_names:
    - people

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: CustomAuthenticator
        client_id: "{{ config['client_id'] }}"
        class_name: components.ClientCredentialsConfigUpdaterAuthenticator
        client_secret: "{{ config['client_secret'] }}"
        token_refresh_endpoint: "{{ config['api_host'] }}/oauth/access_token"
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            max_retries: 8
            response_filters:
              - type: HttpResponseFilter
                action: IGNORE
                http_codes:
                  - 404
              - type: HttpResponseFilter
                action: IGNORE
                http_codes:
                  - 409
              - type: HttpResponseFilter
                action: RATE_LIMITED
                predicate: >-
                  {{ 'rate limit exceeded' in (response.get('message', '') |
                  lower) }}
                http_codes:
                  - 403
              - type: HttpResponseFilter
                action: RATE_LIMITED
                http_codes:
                  - 429
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 502
                  - 503
                  - 504
            backoff_strategies:
              - type: WaitUntilTimeFromHeader
                header: x-ratelimit-reset
                datetime_format: "%s"
              - type: WaitTimeFromHeader
                header: retry-after
              - type: ConstantBackoffStrategy
                backoff_time_in_seconds: 180
      request_headers:
        Content-Type: application/json
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          field_name: start_index
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 500
          start_from_page: 0
          inject_on_first_request: true

streams:
  - type: DeclarativeStream
    name: people
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
        type: HttpRequester
        url: "{{ config['api_host'] }}/1.0/people"
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        error_handler:
          $ref: "#/definitions/linked/HttpRequester/error_handler"
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        properties:
          id:
            type:
              - integer
              - "null"
          email:
            type:
              - string
              - "null"
          role_id:
            type:
              - integer
              - "null"
          role_ids:
            type:
              - array
              - "null"
            items:
              type:
                - integer
                - "null"
          surname:
            type:
              - string
              - "null"
          team_id:
            type:
              - integer
              - "null"
          first_name:
            type:
              - string
              - "null"
          full_name:
            type:
              - string
              - "null"
          location_id:
            type:
              - integer
              - "null"
          security_group_id:
            type:
              - integer
              - "null"
          skillset:
            type:
              - string
              - "null"
          source:
            type:
              - string
              - "null"
          locked:
            type:
              - boolean
              - "null"
          login_enabled:
            type:
              - boolean
              - "null"
          self_assessment_status:
            type:
              - string
              - "null"
          supervisor_assessment_status:
            type:
              - string
              - "null"
          last_login:
            type:
              - string
              - "null"
          last_self_assessment:
            type:
              - string
              - "null"
        additionalProperties: true
    incremental_sync:
      type: IncrementingCountCursor
      start_value: 0
      cursor_field: id
  - type: DeclarativeStream
    name: skill_ratings
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: >-
          {{ config['api_host'] }}/1.0/skillratings/person/{{
          stream_partition['person_id'] }}
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        error_handler:
          $ref: "#/definitions/linked/HttpRequester/error_handler"
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
          - type: ParentStreamConfig
            stream:
              $ref: "#/streams/0"
            parent_key: id
            partition_field: person_id
    primary_key:
      - person_id
      - skill_id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        properties:
          type:
            type:
              - string
              - "null"
          skill_id:
            type:
              - integer
              - "null"
          person_id:
            type:
              - integer
              - "null"
          synced_at:
            type:
              - string
              - "null"
          skill_name:
            type:
              - string
              - "null"
          skill_level:
            type:
              - string
              - "null"
          target_level:
            type:
              - integer
              - "null"
          interest_level:
            type:
              - string
              - "null"
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - person_id
            value: "{{ stream_partition['person_id'] }}"
          - type: AddedFieldDefinition
            path:
              - synced_at
            value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
  - type: DeclarativeStream
    name: qualifications_assignments
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
        type: HttpRequester
        url: "{{ config['api_host'] }}/2.0/qualificationassignments"
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        error_handler:
          $ref: "#/definitions/linked/HttpRequester/error_handler"
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        properties:
          id:
            type:
              - integer
              - "null"
          status:
            type:
              - string
              - "null"
          end_date:
            type:
              - string
              - "null"
          person_id:
            type:
              - integer
              - "null"
          start_date:
            type:
              - string
              - "null"
          qualification_id:
            type:
              - integer
              - "null"
          badge_url:
            type:
              - string
              - "null"
          url:
            type:
              - string
              - "null"
          issuer:
            type:
              - string
              - "null"
        additionalProperties: true
    incremental_sync:
      type: IncrementingCountCursor
      start_value: 0
      cursor_field: id

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_host
      - client_id
      - client_secret
      - start_date
      - access_token
      - token_expiry_date
    properties:
      api_host:
        type: string
        description: >-
          The API host for your Skills Base instance, for example
          https://api.skills-base.com. Do not include a trailing slash.
        order: 0
        title: API Host
        examples:
          - https://api.skills-base.com
      client_id:
        type: string
        description: Skills Base API client ID used to fetch access tokens.
        order: 1
        title: Client ID
        airbyte_secret: true
      start_date:
        type: string
        description: Start date for incremental skill_ratings sync, in YYYY-MM-DD format.
        order: 3
        title: Start Date
        format: date
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "2024-01-01"
      client_secret:
        type: string
        description: Skills Base API client secret used to fetch access tokens.
        order: 2
        title: Client Secret
        airbyte_secret: true
      access_token:
        type: string
        title: Access Token (auto-managed)
        description: >-
          OAuth access token cached by the connector after a successful
          client_credentials exchange. Do not set manually; populated and
          refreshed automatically.
        airbyte_secret: true
        airbyte_hidden: true
        default: ""
        order: 4
      token_expiry_date:
        type: string
        title: Token Expiry (auto-managed)
        description: >-
          ISO-8601 timestamp marking when the cached access token expires.
          Auto-managed by the connector.
        airbyte_hidden: true
        default: ""
        order: 5
    additionalProperties: true

